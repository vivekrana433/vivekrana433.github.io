<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Responsive Navbar with Particle & Slide Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      background-color: #0f0f0f;
      overflow-x: hidden;
      color: white;
    }

    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;

      position: relative;
      z-index: 2;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #FA6E00 0%, #E60026 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo span:first-child {
      color: orange;
    }

    .logo span:last-child {
      color: crimson;
    }

    .menu-toggle {
      display: none;
      font-size: 28px;
      color: white;
      cursor: pointer;
      z-index: 3;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .nav-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: orange;
    }

    .hire-btn {
      background: linear-gradient(to right, #ff7a00, #ff4d00);
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    /* Mobile nav */
    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }

      .nav-links {
        position: fixed;
        top: 0;
        right: -100%;
        flex-direction: column;
        background-color: #151313;
        height: 100vh;
        width: 70%;
        justify-content: center;
        align-items: center;
        gap: 25px;
        transition: right 0.3s ease-in-out;
      }

      .nav-links.show {
        right: 0;
      }

      .hire-btn {
        margin-top: 10px;
      }
    }

    .hero-content {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.85;
    }
  </style>
</head>

<body>

  <div id="particles-js"></div>

  <nav>
    <div class="logo">VIVEK</div>
    <div class="menu-toggle" id="menuIcon">☰</div>
    <div class="nav-links" id="navLinks">
      <a href="#" class="active">Home</a>
      <a href="#">About me</a>
      <a href="#">Portfolio</a>
      <a href="#">Contact me</a>
      <button class="hire-btn">Hire Me</button>
    </div>
  </nav>

  <div class="hero-content">
    <h1>Hi, I'm Vivek Rana</h1>
    <p>UI/UX Designer | Web Creative</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    // Particle config
    particlesJS('particles-js', {
      particles: {
        number: {
          value: 100,
          density: { enable: true, value_area: 800 }
        },
        color: { value: '#ffffff' },
        shape: { type: 'circle' },
        opacity: { value: 0.5, random: true },
        size: { value: 3, random: true },
        line_linked: {
          enable: true,
          distance: 150,
          color: '#ffffff',
          opacity: 0.4,
          width: 1
        },
        move: {
          enable: true,
          speed: 1,
          direction: 'none',
          out_mode: 'out'
        }
      },
      interactivity: {
        detect_on: 'canvas',
        events: {
          onhover: { enable: true, mode: 'grab' },
          resize: true
        },
        modes: {
          grab: {
            distance: 200,
            line_linked: { opacity: 0.8 }
          }
        }
      },
      retina_detect: true
    });

    // Toggle Nav Menu + X
    const toggle = document.getElementById('menuIcon');
    const navLinks = document.getElementById('navLinks');

    toggle.addEventListener('click', () => {
      navLinks.classList.toggle('show');
      toggle.textContent = navLinks.classList.contains('show') ? '✖' : '☰';
    });
  </script>

</body>

</html>
